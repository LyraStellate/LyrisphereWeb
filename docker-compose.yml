version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lyrisphereweb
    expose:
      - "3000"
    environment:
      - DATABASE_URL=file:/app/data/lyrisphere.db
      - YOUTUBE_API_KEY=${YOUTUBE_API_KEY}
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    labels:
      traefik.enable: "true"
      traefik.docker.network: "cloudflare-network"
      traefik.http.routers.lyrisphere.rule: "Host(`lyrisphere.lyrastellate.dev`)"
      traefik.http.routers.lyrisphere.entrypoints: web
      traefik.http.services.lyrisphere.loadbalancer.server.port: "3000"

networks:
  default:
    external:
      name: cloudflare-network
